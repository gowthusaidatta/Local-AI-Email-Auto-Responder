services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_responder
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-false}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - GENERIC_TIMEZONE=Asia/Kolkata
      - TZ=Asia/Kolkata
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - ai_responder_net
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --proxy=off http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_responder
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ai_responder_net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama_init
    restart: "no"
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/init-ollama.sh:/init-ollama.sh
    networks:
      - ai_responder_net
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/init-ollama.sh"]
    environment:
      - OLLAMA_HOST=http://ollama:11434

volumes:
  n8n_data:
    name: n8n_responder_data
  ollama_data:
    name: ollama_responder_data

networks:
  ai_responder_net:
    name: ai_responder_network
    driver: bridge
